[package]
name = "scanner-remote"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "cyber-posture remote agentless scanning: SSH + snapshot + NBD orchestration"

[[bin]]
name = "scanner-remote"
path = "src/bin/scanner-remote.rs"

[dependencies]
anyhow = "1.0.102"
base64 = "0.22.1"
clap = { version = "4.6.1", features = ["derive"] }
scanner-asset = { version = "0.1.0", path = "../scanner-asset" }
scanner-snapshot-contract = { version = "0.1.0", path = "../scanner-snapshot-contract" }
scanner-snapshot-lvm = { version = "0.1.0", path = "../scanner-snapshot-lvm" }
tempfile = "3.25.0"
uuid = { version = "1.23.1", features = ["v4"] }

[lints]
workspace = true
