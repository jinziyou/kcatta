[package]
name = "scanner-remote"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "cyber-posture remote agent-mode scanning: ship scanner-asset over SSH, run, pull JSON"
readme = "README.md"

[[bin]]
name = "scanner-remote"
path = "src/bin/scanner-remote.rs"

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true, features = ["clock", "std"] }
clap = { workspace = true, features = ["env"] }
dirs = "5.0.1"
scanner-asset = { version = "0.1.0", path = "../scanner-asset" }
scanner-contract = { version = "0.1.0", path = "../scanner-contract" }
scanner-ingest = { version = "0.1.0", path = "../scanner-ingest" }
scanner-malware = { version = "0.1.0", path = "../scanner-malware" }
serde = { workspace = true }
serde_json = { workspace = true }
ssh2 = "0.9.5"
tempfile = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
