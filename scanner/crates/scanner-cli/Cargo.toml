[package]
name = "scanner-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "cyber-posture host scanner CLI (assemble plan, emit/upload AssetReport)"

[features]
default = ["asset"]
asset = ["dep:scanner-asset"]
malware = ["dep:scanner-malware"]
ingest = ["dep:scanner-ingest"]
full = ["asset", "malware"]

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
scanner-asset = { version = "0.1.0", path = "../scanner-asset", optional = true }
scanner-ingest = { version = "0.1.0", path = "../scanner-ingest", optional = true }
scanner-malware = { version = "0.1.0", path = "../scanner-malware", optional = true }
scanner-runtime = { version = "0.1.0", path = "../scanner-runtime" }
serde_json = { workspace = true }

[lints]
workspace = true
