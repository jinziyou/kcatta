[package]
name = "scanner-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true

[features]
default = ["asset"]
asset = ["dep:scanner-asset"]
malware = ["dep:scanner-malware"]
ingest = ["dep:scanner-ingest"]
full = ["asset", "malware"]

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
scanner-asset = { version = "0.1.0", path = "../scanner-asset", optional = true }
scanner-ingest = { version = "0.1.0", path = "../scanner-ingest", optional = true }
scanner-malware = { version = "0.1.0", path = "../scanner-malware", optional = true }
scanner-runtime = { version = "0.1.0", path = "../scanner-runtime" }
serde_json = "1.0.150"

[lints]
workspace = true
