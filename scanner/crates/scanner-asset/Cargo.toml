[package]
name = "scanner-asset"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "cyber-posture static filesystem host asset discovery"
readme = "README.md"

[[bin]]
name = "scanner-asset"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
base64 = "0.22.1"
chrono = { workspace = true, features = ["clock", "std"] }
clap = { workspace = true }
rusqlite = { version = "0.32.1", features = ["bundled"] }
scanner-contract = { version = "0.1.0", path = "../scanner-contract" }
scanner-runtime = { version = "0.1.0", path = "../scanner-runtime" }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
walkdir = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
