[package]
name = "scanner-asset"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "cyber-posture static filesystem host asset discovery"

[[bin]]
name = "scanner-asset"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.44", default-features = false, features = ["clock", "std"] }
clap = { version = "4.6.1", features = ["derive"] }
rusqlite = { version = "0.32.1", features = ["bundled"] }
scanner-contract = { version = "0.1.0", path = "../scanner-contract" }
scanner-runtime = { version = "0.1.0", path = "../scanner-runtime" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
uuid = { version = "1.23.1", features = ["v4"] }
walkdir = "2.5.0"

[dev-dependencies]
tempfile = "3.25.0"

[lints]
workspace = true
