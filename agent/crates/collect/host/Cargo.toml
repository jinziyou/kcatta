[package]
name = "agent-collect-host"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "kcatta collect/host: asset discovery + SBOM + detect-phase orchestration → AssetReport"
readme = "README.md"

# Library + deploy bin `agent-collect-host`.
[lib]
name = "agent_collect_host"
path = "src/lib.rs"

[[bin]]
name = "agent-collect-host"
path = "src/main.rs"

[dependencies]
aho-corasick = "1.1"
anyhow = { workspace = true }
base64 = "0.22.1"
chrono = { workspace = true, features = ["clock", "std"] }
clap = { workspace = true }
# Static container-image scanning: read `docker save` / OCI archives and the
# (optionally gzip-compressed) layer tars to assemble a merged rootfs.
flate2 = "1.0"
tar = "0.4"
tempfile = { workspace = true }
rusqlite = { version = "0.40.1", features = ["bundled"] }
agent-contract = { version = "0.1.0", path = "../../contract" }
agent-detect = { version = "0.1.0", path = "../../detect" }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = "0.11.0"
uuid = { workspace = true }
walkdir = { workspace = true }
nt-hive = "0.3.0"

[target.'cfg(target_os = "linux")'.dependencies]
# getifaddrs (safe wrapper) for live-host IP/MAC collection; unsafe_code=deny-clean.
nix = { version = "0.31", features = ["net"] }

[target.'cfg(windows)'.dependencies]
winreg = "0.56.0"
windows-sys = { version = "0.61.2", features = ["Win32_System_SystemInformation"] }

[dev-dependencies]
jsonschema = { workspace = true }

[lints]
workspace = true
