[workspace]
resolver = "2"
members = [
    # Shared base: the data contract (zero internal deps).
    "crates/contract",   # data contract: AssetReport + FlowBatch + GuardEventBatch
    # Three capabilities — one directory each, lib + bin; collect-only (write files).
    "crates/host",       # posture-host:  host static file detection (+ built-in malware scan)
    "crates/flow",       # posture-flow:  traffic detection (capture + IOC + intel-sync)
    "crates/guard",      # posture-guard: real-time protection daemon (detect + respond + report)
    # Umbrella: the single `agent` binary — aggregates the three CLIs AND owns ingest (upload).
    "crates/agent",      # posture-agent: `agent host|flow|guard`; `--upload` posts to fusion
]

# posture agent workspace — host + network telemetry collection.
# See README.md and docs/ARCHITECTURE.md.
[workspace.package]
edition = "2021"
license = "Apache-2.0"
publish = false
repository = "https://github.com/jinziyou/posture"

# Shared third-party dependencies. Per-crate manifests pin the version here and
# only add the features they need (features are additive across the workspace).
[workspace.dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.44", default-features = false }
clap = { version = "4.6.1", features = ["derive"] }
jsonschema = "0.46.5"
reqwest = { version = "0.12.28", default-features = false, features = ["blocking", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
tempfile = "3.25.0"
uuid = { version = "1.23.1", features = ["v4"] }
walkdir = "2.5.0"

[workspace.lints.rust]
unsafe_code = "deny"
missing_docs = "warn"
