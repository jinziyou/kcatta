name: DCO

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: Signed-off-by
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on all PR commits
        # Dependabot opens PRs with bot-authored commits that cannot carry a
        # Signed-off-by matching their author, so routine dependency bumps would be
        # permanently DCO-blocked. Exempt them. The guard is on the STEP, not the
        # job: a skipped step still completes the job successfully, so the required
        # "Signed-off-by" status check reports green for dependabot PRs instead of
        # going missing (a job-level `if` would leave the required check "Expected"
        # and still block the merge). Keyed on the PR author (not github.actor) so a
        # human pushing to a dependabot branch is still enforced.
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          failed=0
          # --no-merges: merge commits are exempt (they carry no original authorship
          # — DCO.md only requires sign-off on the substantive commits). Author
          # identity is taken from the commit's own author field and must match a
          # Signed-off-by line, so a pasted/placeholder sign-off no longer passes.
          while IFS= read -r commit; do
            [[ -z "${commit}" ]] && continue

            author_email="$(git log -1 --format='%ae' "${commit}")"
            subject="$(git log -1 --oneline "${commit}")"

            # All Signed-off-by emails on this commit (lowercased for comparison).
            mapfile -t signoff_emails < <(
              git log -1 --format='%B' "${commit}" \
                | grep -iE '^Signed-off-by: .+ <.+@.+>' \
                | sed -E 's/.*<([^>]+)>.*/\1/' \
                | tr '[:upper:]' '[:lower:]'
            )

            if [[ "${#signoff_emails[@]}" -eq 0 ]]; then
              echo "::error::Missing Signed-off-by in commit ${subject}"
              failed=1
              continue
            fi

            # The commit's author email must appear among the sign-off emails
            # (DCO.md §17: the sign-off identity must match the commit author).
            author_email_lc="$(printf '%s' "${author_email}" | tr '[:upper:]' '[:lower:]')"
            matched=0
            for e in "${signoff_emails[@]}"; do
              if [[ "${e}" == "${author_email_lc}" ]]; then
                matched=1
                break
              fi
            done

            if [[ "${matched}" -ne 0 ]]; then
              echo "OK  ${subject} (signed off by author <${author_email}>)"
            else
              echo "::error::Signed-off-by does not match commit author <${author_email}> in ${subject}"
              echo "       sign-off emails found: ${signoff_emails[*]}"
              failed=1
            fi
          done < <(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")

          if [[ "${failed}" -ne 0 ]]; then
            echo "Each non-merge commit must include a Signed-off-by matching its author."
            echo "Fix with: git commit -s   (or: git rebase --signoff ${BASE_SHA})"
            exit 1
          fi
          echo "All commits include a Signed-off-by matching their author"
