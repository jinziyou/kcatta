name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    name: probe (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: probe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: probe
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all-targets

  form:
    name: form (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: form
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m venv .venv
      - run: .venv/bin/pip install -e ".[dev]"
      - run: .venv/bin/ruff check src tests
      - run: .venv/bin/pytest
      - name: JSON Schema export is in sync
        run: |
          .venv/bin/python scripts/export_schemas.py
          git diff --exit-code schemas-json/

  portal:
    name: portal (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: portal/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate:contracts
      - name: Generated contracts are in sync
        run: git diff --exit-code src/lib/schemas/
      - run: pnpm lint
      - run: pnpm build

  e2e:
    name: e2e (portal + form)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install form
        working-directory: form
        run: |
          python -m venv .venv
          .venv/bin/pip install -e .
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: portal/pnpm-lock.yaml
      - name: Install portal + Playwright
        working-directory: portal
        run: |
          pnpm install --frozen-lockfile
          pnpm generate:contracts
          pnpm build
          pnpm exec playwright install chromium --with-deps
      - name: Run E2E smoke tests
        working-directory: portal
        env:
          CI: "true"
          E2E_API_TOKEN: e2e-ci-token
        run: pnpm test:e2e
