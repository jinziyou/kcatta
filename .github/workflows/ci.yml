name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    name: agent (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      # libpcap is needed to compile/test the `pcap` feature.
      - run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - run: cargo fmt --all -- --check
      # --locked: fail if Cargo.lock is out of date (parity with portal's
      # --frozen-lockfile). --all-features: also compile/run the malware (ClamAV)
      # and pcap tests, which are feature-gated and otherwise never built in CI.
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-targets --all-features
      # Independence + lean: each of the three binaries builds standalone with a
      # minimal feature set (guards the "each capability runs independently" goal).
      - run: cargo build --locked -p posture-host
      - run: cargo build --locked -p posture-flow --no-default-features
      - run: cargo build --locked -p posture-guard --no-default-features --features fim

  fusion:
    name: fusion (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fusion
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m venv .venv
      - run: .venv/bin/pip install -e ".[dev]"
      - run: .venv/bin/ruff check src tests scripts
      - run: .venv/bin/pytest
      - name: JSON Schema export is in sync
        run: |
          .venv/bin/python scripts/export_schemas.py
          git diff --exit-code schemas-json/

  portal:
    name: portal (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: portal/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate:contracts
      - name: Generated contracts are in sync
        run: git diff --exit-code src/lib/schemas/
      - run: pnpm lint
      - run: pnpm build

  # Supply-chain vulnerability scan across all three ecosystems. Non-blocking
  # for now (continue-on-error) so it surfaces advisories without gating merges;
  # tighten to blocking once the signal/noise is understood.
  security-audit:
    name: dependency audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: cargo audit (agent)
        working-directory: agent
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: pip-audit (fusion)
        working-directory: fusion
        run: |
          python -m pip install pip-audit
          pip-audit .

      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: portal/pnpm-lock.yaml
      - name: pnpm audit (portal)
        working-directory: portal
        run: pnpm audit --prod

  e2e:
    name: e2e (portal + fusion)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install fusion
        working-directory: fusion
        run: |
          python -m venv .venv
          .venv/bin/pip install -e .
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: portal/pnpm-lock.yaml
      - name: Install portal + Playwright
        working-directory: portal
        run: |
          pnpm install --frozen-lockfile
          pnpm generate:contracts
          pnpm build
          pnpm exec playwright install chromium --with-deps
      - name: Run E2E smoke tests
        working-directory: portal
        env:
          CI: "true"
          E2E_API_TOKEN: e2e-ci-token
        run: pnpm test:e2e
