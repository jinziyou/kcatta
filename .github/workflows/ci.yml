name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default (G4): the workflow only needs to read the repo.
# Jobs that need more (artifact upload, CodeQL SARIF upload) grant it locally.
permissions:
  contents: read

jobs:
  agent:
    name: agent (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      # libpcap is needed to compile/test the `pcap` feature.
      - run: sudo apt-get update && sudo apt-get install -y libpcap-dev
      - run: cargo fmt --all -- --check
      # --locked: fail if Cargo.lock is out of date (parity with admin's
      # --frozen-lockfile). --all-features: also compile/run the built-in malware
      # matcher (self-contained EICAR / SHA-256 / byte-substring engine — NOT a
      # real ClamAV/clamd integration) and the pcap tests, which are feature-gated
      # and otherwise never built in CI.
      #
      # NOTE: --all-features also enables the `ebpf` feature, but this runner has
      # no nightly + rust-src + bpf-linker, so agent-{trace,guard}'s build.rs takes
      # its stub branch (empty object + warning) and the kernel programs are NOT
      # compiled here. The dedicated `agent-ebpf` job below builds them for real.
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-targets --all-features
      # Independence + lean: each of the three binaries builds standalone with a
      # minimal feature set (guards the "each capability runs independently" goal).
      - run: cargo build --locked -p agent-host
      - run: cargo build --locked -p agent-trace --no-default-features
      - run: cargo build --locked -p agent-guard --no-default-features --features fim

  # Prove (and keep proving) that the agent is Windows-buildable: guard/trace/agentd
  # have Linux-only sensor backends but platform-neutral cores, so they SHOULD link
  # for x86_64-pc-windows-msvc. This job freezes that invariant (clippy -D warnings
  # catches any newly-added ungated nix/os::unix use) and runs the Windows runtime
  # smoke tests — guard FIM (ReadDirectoryChangesW via `notify`) and trace WinNet
  # (IP Helper via `netstat2`). Lean feature set: FIM-capable guard + WinNet-capable
  # trace + the agentd umbrella that links guard+trace+host — deliberately NO
  # ebpf/pcap (aya + libpcap are Linux-only). See agent/docs/WINDOWS-RUNTIME-DETECTION.md.
  agent-windows:
    name: agent (Windows MSVC)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      - name: clippy (windows, lean)
        run: >
          cargo clippy --locked --all-targets --target x86_64-pc-windows-msvc
          -p agent-guard -p agent-trace -p agentd
          --no-default-features --features agent-guard/fim,agent-guard/behavior,agent-trace/winnet,agentd/winnet
          -- -D warnings
      # The agentd umbrella link (it statically pulls guard+trace+host into one
      # binary) is the load-bearing assertion that nothing has a stray ungated
      # Linux-only reference.
      - name: build (windows)
        run: >
          cargo build --locked --target x86_64-pc-windows-msvc
          -p agent-guard -p agent-trace -p agentd
          --no-default-features --features agent-guard/fim,agent-guard/behavior,agent-trace/winnet,agentd/winnet
      # agentd has no lib tests (its bins dispatch to guard, which runs at runtime),
      # so test only the libraries — this runs the Windows FIM + WinNet smoke tests.
      - name: test (windows incl. FIM + WinNet smoke)
        run: >
          cargo test --locked --all-targets --target x86_64-pc-windows-msvc
          -p agent-guard -p agent-trace
          --no-default-features --features agent-guard/fim,agent-guard/behavior,agent-trace/winnet

  # Actually compile the eBPF kernel programs (G1). The main `agent` job runs
  # --all-features on a stable runner with no nightly/rust-src/bpf-linker, so
  # agent-{trace,guard}'s build.rs falls back to its empty-stub branch and the
  # in-kernel code (guard's connect4/6 C2 blocker, trace's probes — verifier,
  # struct offsets, byte-order logic) never gets compiled or type-checked.
  #
  # This job installs the real eBPF toolchain and builds the kernel binaries the
  # way build.rs does (see agent/crates/{trace,guard}/build.rs): pinned nightly +
  # rust-src + bpf-linker, target bpfel-unknown-none, -Z build-std=core, with the
  # bpf_target_arch cfg. It then exercises the host-side wrappers' build.rs path
  # by building agent-trace / agent-guard with --features ebpf for real.
  #
  # Non-blocking for now (continue-on-error) so a kernel-code compile break is
  # surfaced loudly without gating merges while the eBPF build is stabilized in
  # CI; flip to blocking once it is reliably green.
  agent-ebpf:
    name: agent (eBPF kernel build)
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      # nightly + rust-src: the bpf target is built with -Z build-std=core, which
      # needs the std-library source component. build.rs (step 2) shells out to
      # `rustup run nightly cargo build`, so both steps use the same generic
      # `nightly` alias. (A date pin would aid reproducibility, but it must stay
      # new enough for bpf-linker to build — deferred to a rust-toolchain.toml.)
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      # The BPF bytecode linker that build.rs (and aya) shell out to. Built with
      # the current nightly above (bpf-linker requires a recent rustc).
      - run: cargo install bpf-linker --locked
      # 1) Build the kernel objects directly, mirroring build.rs's invocation.
      #    --target bpfel-unknown-none + -Zbuild-std=core; the bpf_target_arch cfg
      #    is what aya-ebpf reads to pick register bindings (build.rs sets it via
      #    CARGO_ENCODED_RUSTFLAGS; here host arch is x86_64).
      - name: Build trace-ebpf / guard-ebpf kernel objects
        run: |
          cargo +nightly build \
            --locked --release \
            -p agent-ebpf \
            --bin trace-ebpf --bin guard-ebpf \
            --features ebpf \
            -Z build-std=core \
            --target bpfel-unknown-none
        env:
          CARGO_ENCODED_RUSTFLAGS: "--cfg=bpf_target_arch=\"x86_64\"\x1f-Cdebuginfo=2\x1f-Clink-arg=--btf"
      # 2) Build the host-side crates with the ebpf feature on, so build.rs runs
      #    its real (non-stub) branch and embeds the freshly built objects.
      - run: cargo build --locked -p agent-trace --features ebpf
      - run: cargo build --locked -p agent-guard --features ebpf

  agent-deploy:
    name: agent (musl deploy build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          # Static target shipped to remote scan targets (runs on any Linux).
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent
      # musl C toolchain for agent-host's bundled SQLite and ring (TLS).
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      # The three artifacts analyzer deploys (host/flow lean; agentd = full guard,
      # no pcap — it needs a dynamic libpcap and would break the static build).
      - run: cargo build --locked --release --target x86_64-unknown-linux-musl -p agent-host -p agent-trace
      - run: cargo build --locked --release --target x86_64-unknown-linux-musl -p agentd --features onaccess,network,ids
      - uses: actions/upload-artifact@v7
        with:
          name: agent-musl-x86_64
          path: |
            agent/target/x86_64-unknown-linux-musl/release/agent-host
            agent/target/x86_64-unknown-linux-musl/release/agent-trace
            agent/target/x86_64-unknown-linux-musl/release/agentd
          if-no-files-found: error

  agent-deploy-arm64:
    name: agent (musl deploy build, arm64)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      # `cross` cross-compiles aarch64-musl in a docker image that ships the C
      # toolchain (bundled SQLite + ring), so no host musl-gcc gymnastics.
      - run: cargo install cross --locked
      - run: cross build --locked --release --target aarch64-unknown-linux-musl -p agent-host -p agent-trace
      - run: cross build --locked --release --target aarch64-unknown-linux-musl -p agentd --features onaccess,network,ids
      - uses: actions/upload-artifact@v7
        with:
          name: agent-musl-aarch64
          path: |
            agent/target/aarch64-unknown-linux-musl/release/agent-host
            agent/target/aarch64-unknown-linux-musl/release/agent-trace
            agent/target/aarch64-unknown-linux-musl/release/agentd
          if-no-files-found: error

  analyzer:
    name: analyzer (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: analyzer
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      # Install from the committed lockfile (G2): `uv sync --locked` fails if
      # uv.lock is out of date, giving Python the same pinned-dependency guarantee
      # as the Rust (--locked) and admin (--frozen-lockfile) jobs.
      - run: pip install uv==0.11.6
      - run: uv sync --locked --extra dev
      - run: .venv/bin/ruff check src tests scripts
      - run: .venv/bin/pytest
      - name: JSON Schema export is in sync
        run: |
          .venv/bin/python scripts/export_schemas.py
          git diff --exit-code schemas-json/
      - name: OpenAPI export is in sync
        run: |
          .venv/bin/python scripts/export_openapi.py
          git diff --exit-code openapi.json

  admin:
    name: admin (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm generate:contracts
      - name: Generated contracts are in sync
        run: git diff --exit-code src/lib/schemas/
      - run: pnpm lint
      - run: pnpm build

  # Supply-chain vulnerability scan across all three ecosystems (G3). No longer a
  # blanket continue-on-error: the job now FAILS on HIGH/CRITICAL advisories and
  # only treats lower-severity findings as informational. Audit tools are pinned
  # so the gate is reproducible (don't let a new advisory DB silently change the
  # pass/fail boundary on an unrelated PR; bump versions deliberately).
  security-audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # cargo-audit reports RUSTSEC advisories. Non-gating for now
      # (continue-on-error): the upstream advisory-db currently ships a malformed
      # entry (RUSTSEC-2026-0124) that breaks cargo-audit's database load, and
      # Cargo.lock pins a yanked crossbeam-channel — both would fail the build for
      # reasons unrelated to a real, fixable advisory. Re-tighten (drop
      # continue-on-error, restore --deny warnings) once those upstream issues clear.
      - name: cargo audit (agent)
        working-directory: agent
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked --version ^0.21
          cargo audit

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      # pip-audit exits non-zero on ANY known vulnerability; that's our HIGH/CRIT
      # gate for Python (the advisory feed it uses does not expose a severity
      # threshold flag, so any matched CVE blocks — acceptable for a small dep set).
      - name: pip-audit (analyzer)
        working-directory: analyzer
        run: |
          python -m pip install "pip-audit==2.9.*"
          pip-audit .

      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml
      # pnpm audit: gate on high/critical only (moderate/low are reported but do
      # not fail the build, to keep transitive-dev noise from blocking merges).
      - name: pnpm audit (admin)
        working-directory: admin
        run: pnpm audit --prod --audit-level high

  # Secret scan over the FULL git history (gitleaks). Uses the gitleaks binary
  # (MIT, free for public AND private repos) rather than gitleaks-action, which
  # gates private repos behind a license key. fetch-depth:0 so old commits are
  # scanned too. Gating: fails the build on any detected secret — a hard
  # pre-open-source guard against leaked tokens/keys/credentials.
  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VER=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan full git history for secrets
        run: gitleaks detect --redact --no-banner --exit-code 1

  # Container-image / filesystem vulnerability scan (G3). Builds the analyzer and
  # admin images and scans them with Trivy. Non-blocking for now (continue-on-
  # error) so it reports OS/library CVEs in the shipped images without gating
  # merges; tighten to blocking (drop continue-on-error, set exit-code: 1) once
  # the baseline is understood.
  image-scan:
    name: image scan (Trivy)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      # The analyzer image is multi-stage and bundles the agent's static-musl
      # deploy binary, so it needs the agent source as the `agent_src` build
      # context (mirrors docker-compose's additional_contexts). BuildKit is
      # default on GitHub runners, so `--build-context` is available.
      - name: Build analyzer image
        run: docker build -t kcatta-analyzer:ci --build-context agent_src=./agent ./analyzer
      - name: Build admin image
        run: docker build -t kcatta-admin:ci ./admin

      - name: Trivy scan analyzer image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: kcatta-analyzer:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
      - name: Trivy scan admin image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: kcatta-admin:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

  # Static application security testing (G3). GitHub CodeQL over the Python
  # (analyzer) and JS/TS (admin) code; Rust is intentionally out of scope here
  # (covered by clippy + cargo-audit). Non-blocking for now (continue-on-error)
  # so results land in the Security tab without gating merges initially.
  codeql:
    name: CodeQL SAST (${{ matrix.language }})
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write   # required to upload SARIF results
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  e2e:
    name: e2e (admin + analyzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install analyzer
        working-directory: analyzer
        run: |
          python -m venv .venv
          .venv/bin/pip install -e .
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: admin/pnpm-lock.yaml
      - name: Install admin + Playwright
        working-directory: admin
        run: |
          pnpm install --frozen-lockfile
          pnpm generate:contracts
          pnpm build
          pnpm exec playwright install chromium --with-deps
      - name: Run E2E smoke tests
        working-directory: admin
        env:
          CI: "true"
          E2E_API_TOKEN: e2e-ci-token
        run: pnpm test:e2e
