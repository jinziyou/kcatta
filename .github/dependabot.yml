version: 2
updates:
  # Rust agent crates
  - package-ecosystem: cargo
    directory: /agent
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Python analyzer backend
  - package-ecosystem: pip
    directory: /analyzer
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # Next.js admin
  - package-ecosystem: npm
    directory: /admin
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions used by CI
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
