[package]
name = "fusion-runtime"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "posture fusion orchestrator: the `fusion` CLI that schedules host/flow/intel-sync modules and uploads to form"
readme = "README.md"

# The single fusion entrypoint. Subcommands dispatch to the domain crates:
#   fusion host        → fusion-host  (asset scan / per-asset JSON, optional ClamAV)
#   fusion flow        → fusion-flow  (capture + IOC match → FlowBatch)
#   fusion intel-sync  → fusion-flow  (download IOC feeds → local JSON)
[[bin]]
name = "fusion"
path = "src/main.rs"

[features]
# Domain modules are feature-gated so a lean host-only agent build does not link
# the flow/pcap surface (and vice versa):
#   cargo build -p fusion-runtime --no-default-features --features host,malware
default = ["host", "flow"]
host = ["dep:fusion-host"]
flow = ["dep:fusion-flow", "dep:reqwest"]
malware = ["host", "fusion-host/malware"]
pcap = ["flow", "fusion-flow/pcap"]
full = ["host", "flow", "malware"]

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
serde_json = { workspace = true }
fusion-contract = { version = "0.1.0", path = "../contract" }
fusion-ingest = { version = "0.1.0", path = "../ingest" }
fusion-host = { version = "0.1.0", path = "../host", optional = true }
fusion-flow = { version = "0.1.0", path = "../flow", optional = true }
reqwest = { version = "0.12.28", default-features = false, features = ["blocking", "rustls-tls"], optional = true }

[lints]
workspace = true
