[package]
name = "fusion-host-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "posture host scan CLI (assemble plan, emit/upload AssetReport)"
readme = "README.md"

[[bin]]
name = "fusion-host"
path = "src/main.rs"

[features]
default = ["asset"]
asset = ["dep:fusion-asset"]
malware = ["dep:fusion-malware"]
ingest = ["dep:fusion-ingest"]
full = ["asset", "malware"]

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true }
fusion-asset = { version = "0.1.0", path = "../fusion-asset", optional = true }
fusion-ingest = { version = "0.1.0", path = "../fusion-ingest", optional = true }
fusion-malware = { version = "0.1.0", path = "../fusion-malware", optional = true }
fusion-runtime = { version = "0.1.0", path = "../fusion-runtime" }
serde_json = { workspace = true }

[lints]
workspace = true
