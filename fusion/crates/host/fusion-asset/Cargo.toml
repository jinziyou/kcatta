[package]
name = "fusion-asset"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "posture static filesystem host asset discovery"
readme = "README.md"

[[bin]]
name = "fusion-asset"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
base64 = "0.22.1"
chrono = { workspace = true, features = ["clock", "std"] }
clap = { workspace = true }
rusqlite = { version = "0.32.1", features = ["bundled"] }
fusion-contract = { version = "0.1.0", path = "../../contract" }
fusion-runtime = { version = "0.1.0", path = "../../runtime/fusion-runtime" }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
walkdir = { workspace = true }
nt-hive = "0.3.0"

[target.'cfg(windows)'.dependencies]
winreg = "0.56.0"
windows-sys = { version = "0.59.0", features = ["Win32_System_SystemInformation"] }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
