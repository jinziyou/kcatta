global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: analyzer
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /secrets/analyzer-metrics/token
    static_configs:
      - targets:
          - analyzer:10068

  - job_name: form
    metrics_path: /metrics
    authorization:
      type: Bearer
      credentials_file: /secrets/form-metrics/token
    static_configs:
      - targets:
          - form:10067
