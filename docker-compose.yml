# Local stack: fusion API + portal UI.
#
#   cp .env.example .env   # then set a strong FUSION_API_TOKEN
#   docker compose up --build
#   open http://localhost:3000
#
# FUSION_API_TOKEN must be provided via .env — compose intentionally has NO
# built-in default (a shipped default token == no auth). See .env.example.

services:
  fusion:
    build: ./fusion
    ports:
      - "8000:8000"
    environment:
      FUSION_DATA_DIR: /data
      FUSION_STORAGE: sqlite
      FUSION_CORS_ORIGINS: http://localhost:3000
      FUSION_API_TOKEN: ${FUSION_API_TOKEN:?set FUSION_API_TOKEN in .env (see .env.example); refusing to start with a built-in default token}
    volumes:
      - fusion-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  portal:
    build:
      context: ./portal
      args:
        # fusion access is server-side (RSC fetch) inside the portal container, so this
        # must be the compose service DNS name, not localhost (which is the portal itself).
        NEXT_PUBLIC_FUSION_BASE_URL: http://fusion:8000
    ports:
      - "3000:3000"
    environment:
      FUSION_API_TOKEN: ${FUSION_API_TOKEN:?set FUSION_API_TOKEN in .env (see .env.example); refusing to start with a built-in default token}
    depends_on:
      fusion:
        condition: service_healthy

volumes:
  fusion-data:
