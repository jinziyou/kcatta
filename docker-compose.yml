# Local stack: analyzer + Form control plane + admin UI. Zero-config:
#
#   docker compose up --build
#   open http://localhost:10063
#
# Five trust-domain tokens are generated into separate private volumes:
# admin→Form, agent→Form ingest, monitoring→Form metrics, Form→analyzer internal,
# and monitoring→Analyzer metrics. Explicit values override generated files.
# `docker compose down -v` wipes the volumes and rotates the tokens on restart.

services:
  # One-shot: generate a strong random token into each isolated trust-domain volume
  # on first run (idempotent — reused afterwards). Reuses the already-pulled
  # python base image so it needs no extra pull/build.
  token-init:
    image: python:3.11.11-slim
    user: root
    restart: "no"
    volumes:
      - form-admin-secret:/secrets/form-api
      - form-ingest-secret:/secrets/form-ingest
      - form-metrics-secret:/secrets/form-metrics
      - analyzer-internal-secret:/secrets/analyzer-internal
      - analyzer-metrics-secret:/secrets/analyzer-metrics
    command:
      - /bin/sh
      - -c
      - |
        for domain in form-api form-ingest form-metrics analyzer-internal analyzer-metrics; do
          if [ ! -s "/secrets/$$domain/token" ]; then
            DOMAIN="$$domain" python -c "import os,secrets; open('/secrets/'+os.environ['DOMAIN']+'/token','w').write(secrets.token_urlsafe(32))"
            chmod 444 "/secrets/$$domain/token"
            echo "kcatta: generated $$domain token"
          else
            echo "kcatta: reusing $$domain token"
          fi
        done

  analyzer:
    build:
      context: ./analyzer
    depends_on:
      token-init:
        condition: service_completed_successfully
    # Runtime hardening (G6). The analyzer container runs as the non-root
    # `analyzer` user (see analyzer/Dockerfile); on top of that:
    #   - no-new-privileges: block setuid/privilege escalation inside the container
    #   - cap_drop: ALL — the API needs no Linux capabilities
    #   - mem_limit / pids_limit — bound blast radius of a runaway/exploited process
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    mem_limit: 512m
    pids_limit: 256
    # Analyzer is private to the form-analyzer network. Admin and agents have no
    # route or credential for it; all requests cross Form.
    expose:
      - "10068"
    environment:
      ANALYZER_DATA_DIR: /data
      # Keep the advisory corpus in the persistent data volume.  The image's
      # relative default (data/osv) resolves under /app and is intentionally not
      # writable/persistent, which previously made the zero-config stack run
      # with CVE matching silently disabled.
      ANALYZER_OSV_DIR: /data/osv
      # On the first start, seed the empty corpus from OSV before serving
      # requests.  Air-gapped deployments can set this to false and mount a
      # pre-synchronised corpus at ANALYZER_OSV_DIR instead.
      ANALYZER_OSV_AUTO_SYNC: ${ANALYZER_OSV_AUTO_SYNC:-true}
      # Kali packages are checked separately against an exact Debian source
      # package/version index. Kali forks remain explicitly unverified.
      ANALYZER_DEBIAN_TRACKER_DIR: /data/debian-tracker
      ANALYZER_DEBIAN_TRACKER_AUTO_SYNC: ${ANALYZER_DEBIAN_TRACKER_AUTO_SYNC:-true}
      ANALYZER_DEBIAN_TRACKER_MAX_AGE_HOURS: ${ANALYZER_DEBIAN_TRACKER_MAX_AGE_HOURS:-48}
      ANALYZER_DEBIAN_TRACKER_REFRESH_SECONDS: ${ANALYZER_DEBIAN_TRACKER_REFRESH_SECONDS:-86400}
      ANALYZER_STORAGE: sqlite
      # Acknowledge only after the full envelope is committed to the durable
      # SQLite outbox, then run OSV/correlation in a leased retrying worker.
      ANALYZER_DERIVED_ASYNC: ${ANALYZER_DERIVED_ASYNC:-true}
      ANALYZER_INGEST_LEDGER_MAX_BYTES: ${ANALYZER_INGEST_LEDGER_MAX_BYTES:-536870912}
      ANALYZER_SQLITE_MAX_BYTES: ${ANALYZER_SQLITE_MAX_BYTES:-1073741824}
      ANALYZER_SQLITE_WAL_MAX_BYTES: ${ANALYZER_SQLITE_WAL_MAX_BYTES:-67108864}
      ANALYZER_SQLITE_MAX_TABLE_BYTES: ${ANALYZER_SQLITE_MAX_TABLE_BYTES:-100663296}
      ANALYZER_SQLITE_MAX_ROWS_PER_TABLE: ${ANALYZER_SQLITE_MAX_ROWS_PER_TABLE:-100000}
      ANALYZER_STORAGE_MAX_RECORD_BYTES: ${ANALYZER_STORAGE_MAX_RECORD_BYTES:-12582912}
      ANALYZER_STORAGE_READ_MAX_BYTES: ${ANALYZER_STORAGE_READ_MAX_BYTES:-33554432}
      ANALYZER_REPORT_PROJECTION_CACHE_ENTRIES: ${ANALYZER_REPORT_PROJECTION_CACHE_ENTRIES:-64}
      ANALYZER_REPORT_PROJECTION_CACHE_BYTES: ${ANALYZER_REPORT_PROJECTION_CACHE_BYTES:-67108864}
      ANALYZER_INTERNAL_TOKEN: ${ANALYZER_INTERNAL_TOKEN:-}
      ANALYZER_METRICS_TOKEN: ${ANALYZER_METRICS_TOKEN:-}
    # Load the generated token when none was provided, then run the API. The
    # exec'd command mirrors the image CMD (compose entrypoint overrides clear it).
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$$ANALYZER_INTERNAL_TOKEN" ] && [ -s /secrets/analyzer-internal/token ]; then
          export ANALYZER_INTERNAL_TOKEN="$$(cat /secrets/analyzer-internal/token)"
        fi
        if [ -z "$$ANALYZER_METRICS_TOKEN" ] && [ -s /secrets/analyzer-metrics/token ]; then
          export ANALYZER_METRICS_TOKEN="$$(cat /secrets/analyzer-metrics/token)"
        fi
        if [ -z "$$ANALYZER_INTERNAL_TOKEN" ] || [ -z "$$ANALYZER_METRICS_TOKEN" ]; then
          echo "kcatta: ANALYZER_INTERNAL_TOKEN and ANALYZER_METRICS_TOKEN are required" >&2
          exit 1
        fi
        if [ "$$ANALYZER_OSV_AUTO_SYNC" = "true" ]; then
          mkdir -p "$$ANALYZER_OSV_DIR"
          if ! .venv/bin/analyzer-osv-sync --verify-only --db "$$ANALYZER_OSV_DIR" >/dev/null 2>&1; then
            echo "kcatta: OSV corpus is absent, stale, or incomplete; synchronising supported ecosystems"
            if ! .venv/bin/analyzer-osv-sync --index-only --db "$$ANALYZER_OSV_DIR"; then
              echo "kcatta: OSV sync failed; Analyzer will start in explicitly degraded mode" >&2
            fi
          fi
        fi
        if [ "$$ANALYZER_DEBIAN_TRACKER_AUTO_SYNC" = "true" ]; then
          mkdir -p "$$ANALYZER_DEBIAN_TRACKER_DIR"
          if ! .venv/bin/analyzer-debian-tracker-sync --verify-only --db "$$ANALYZER_DEBIAN_TRACKER_DIR" >/dev/null 2>&1; then
            echo "kcatta: Debian Security Tracker index is absent or invalid; synchronising"
            if ! .venv/bin/analyzer-debian-tracker-sync --db "$$ANALYZER_DEBIAN_TRACKER_DIR"; then
              echo "kcatta: Debian tracker sync failed; Kali dpkg coverage will remain explicitly partial" >&2
            fi
          fi
        fi
        exec .venv/bin/analyzer-api --host 0.0.0.0 --port 10068
    volumes:
      - analyzer-internal-secret:/secrets/analyzer-internal:ro
      - analyzer-metrics-secret:/secrets/analyzer-metrics:ro
      - analyzer-data:/data
    networks:
      - form-analyzer
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:10068/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10
      # The first OSV corpus download can take longer than a normal API start.
      start_period: 10m

  form:
    image: kcatta-form:latest
    build:
      context: ./form
      additional_contexts:
        agent_src: ./agent
        analyzer_src: ./analyzer
    depends_on:
      token-init:
        condition: service_completed_successfully
      analyzer:
        condition: service_healthy
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    mem_limit: 512m
    pids_limit: 256
    # Port 10067 is the only API surface. It binds to loopback by default; remote
    # Guard deployments must explicitly set FORM_BIND_ADDRESS and FORM_PUBLIC_URL.
    ports:
      - "${FORM_BIND_ADDRESS:-127.0.0.1}:10067:10067"
    environment:
      FORM_DATA_DIR: /data
      FORM_STORAGE: sqlite
      FORM_ANALYZER_BASE_URL: http://analyzer:10068
      # Intentionally no loopback default: remote Guard deployment is rejected
      # until the operator supplies a URL reachable from monitored hosts.
      FORM_PUBLIC_URL: ${FORM_PUBLIC_URL:-}
      # New resident Agents use the dedicated :10443 mTLS listener. During a
      # mixed-mode migration FORM_PUBLIC_URL remains the legacy bearer URL.
      FORM_AGENT_PUBLIC_URL: ${FORM_AGENT_PUBLIC_URL:-}
      FORM_ALLOW_INSECURE_HTTP: ${FORM_ALLOW_INSECURE_HTTP:-false}
      FORM_AGENT_AUTH_MODE: ${FORM_AGENT_AUTH_MODE:-mixed}
      FORM_AGENT_IDENTITY_ENABLED: ${FORM_AGENT_IDENTITY_ENABLED:-true}
      FORM_AGENT_IDENTITY_DATA_DIR: /agent-identities
      FORM_AGENT_PKI_DIR: /credentials/kcatta/agent-pki
      FORM_AGENT_TLS_DIR: /agent-tls
      FORM_AGENT_TLS_SERVER_NAME: ${FORM_AGENT_TLS_SERVER_NAME:-}
      FORM_AGENT_TLS_SANS: ${FORM_AGENT_TLS_SANS:-}
      # The control process owns signing and periodically publishes an atomic
      # server-leaf generation for the read-only Agent listener.
      FORM_AGENT_TLS_RENEW_CHECK_SECONDS: ${FORM_AGENT_TLS_RENEW_CHECK_SECONDS:-21600}
      FORM_API_TOKEN: ${FORM_API_TOKEN:-}
      FORM_INGEST_TOKEN: ${FORM_INGEST_TOKEN:-}
      FORM_METRICS_TOKEN: ${FORM_METRICS_TOKEN:-}
      ANALYZER_INTERNAL_TOKEN: ${ANALYZER_INTERNAL_TOKEN:-}
      XDG_CONFIG_HOME: /credentials
      FORM_AGENT_TARGET_DIR: /opt/kcatta/agent-bins
      FORM_WINDOWS_AGENT_BINARY: ${FORM_WINDOWS_AGENT_BINARY:-}
      FORM_MAX_BODY_BYTES: ${FORM_MAX_BODY_BYTES:-10485760}
      FORM_MAX_IN_FLIGHT: ${FORM_MAX_IN_FLIGHT:-16}
      FORM_MAX_IN_FLIGHT_PER_PEER: ${FORM_MAX_IN_FLIGHT_PER_PEER:-8}
      FORM_MAX_INGEST_IN_FLIGHT_PER_PEER: ${FORM_MAX_INGEST_IN_FLIGHT_PER_PEER:-4}
      FORM_INGEST_RATE_PER_SECOND: ${FORM_INGEST_RATE_PER_SECOND:-5}
      FORM_INGEST_BURST: ${FORM_INGEST_BURST:-20}
      FORM_BODY_READ_TIMEOUT_SECONDS: ${FORM_BODY_READ_TIMEOUT_SECONDS:-30}
      # Optional read-only Microsoft Defender for Endpoint cloud connector.
      # Mount the client secret with a local Compose override and provide only
      # its in-container path; plaintext secret environment variables are not accepted.
      FORM_MDE_ENABLED: ${FORM_MDE_ENABLED:-false}
      FORM_MDE_TENANT_ID: ${FORM_MDE_TENANT_ID:-}
      FORM_MDE_CLIENT_ID: ${FORM_MDE_CLIENT_ID:-}
      FORM_MDE_CLIENT_SECRET_FILE: ${FORM_MDE_CLIENT_SECRET_FILE:-}
      FORM_MDE_HOST_MAP_FILE: ${FORM_MDE_HOST_MAP_FILE:-}
      FORM_MDE_STATE_PATH: ${FORM_MDE_STATE_PATH:-/data/mde-sync.db}
      FORM_MDE_POLL_SECONDS: ${FORM_MDE_POLL_SECONDS:-300}
      FORM_MDE_INITIAL_LOOKBACK_HOURS: ${FORM_MDE_INITIAL_LOOKBACK_HOURS:-48}
      FORM_MDE_OVERLAP_SECONDS: ${FORM_MDE_OVERLAP_SECONDS:-300}
      FORM_MDE_MAX_PAGES: ${FORM_MDE_MAX_PAGES:-200}
      FORM_MDE_MAX_ITEMS: ${FORM_MDE_MAX_ITEMS:-20000}
      # Optional MDVM baseline + delta synchronization. It may reuse the MDE
      # identity variables above or use a separate Vulnerability.Read.All app.
      FORM_MDVM_ENABLED: ${FORM_MDVM_ENABLED:-false}
      FORM_MDVM_TENANT_ID: ${FORM_MDVM_TENANT_ID:-}
      FORM_MDVM_CLIENT_ID: ${FORM_MDVM_CLIENT_ID:-}
      FORM_MDVM_CLIENT_SECRET_FILE: ${FORM_MDVM_CLIENT_SECRET_FILE:-}
      FORM_MDVM_HOST_MAP_FILE: ${FORM_MDVM_HOST_MAP_FILE:-}
      FORM_MDVM_STATE_PATH: ${FORM_MDVM_STATE_PATH:-/data/mdvm-sync.db}
      FORM_MDVM_API_HOST: ${FORM_MDVM_API_HOST:-api.security.microsoft.com}
      FORM_MDVM_POLL_SECONDS: ${FORM_MDVM_POLL_SECONDS:-21600}
      FORM_MDVM_BASELINE_REFRESH_HOURS: ${FORM_MDVM_BASELINE_REFRESH_HOURS:-168}
      FORM_MDVM_DELTA_OVERLAP_SECONDS: ${FORM_MDVM_DELTA_OVERLAP_SECONDS:-21600}
      FORM_MDVM_PAGE_SIZE: ${FORM_MDVM_PAGE_SIZE:-1000}
      FORM_MDVM_MAX_PAGES: ${FORM_MDVM_MAX_PAGES:-200}
      FORM_MDVM_MAX_ITEMS: ${FORM_MDVM_MAX_ITEMS:-50000}
      FORM_MDVM_FINDINGS_PER_SNAPSHOT: ${FORM_MDVM_FINDINGS_PER_SNAPSHOT:-512}
      FORM_MDVM_SNAPSHOTS_PER_BATCH: ${FORM_MDVM_SNAPSHOTS_PER_BATCH:-32}
      FORM_MDVM_BATCH_MAX_BYTES: ${FORM_MDVM_BATCH_MAX_BYTES:-3145728}
      FORM_MDVM_STATE_MAX_FINDINGS: ${FORM_MDVM_STATE_MAX_FINDINGS:-200000}
      FORM_MDVM_STATE_MAX_BYTES: ${FORM_MDVM_STATE_MAX_BYTES:-268435456}
      FORM_MAX_SCAN_ARTIFACT_BYTES: ${FORM_MAX_SCAN_ARTIFACT_BYTES:-33554432}
      FORM_MAX_SCAN_TOTAL_BYTES: ${FORM_MAX_SCAN_TOTAL_BYTES:-33554432}
      FORM_MAX_CONCURRENT_SCANS: ${FORM_MAX_CONCURRENT_SCANS:-4}
      FORM_SCAN_JOB_TIMEOUT_SECONDS: ${FORM_SCAN_JOB_TIMEOUT_SECONDS:-1800}
      FORM_REMOTE_COMMAND_TIMEOUT_SECONDS: ${FORM_REMOTE_COMMAND_TIMEOUT_SECONDS:-1800}
      FORM_SCAN_LEASE_SECONDS: ${FORM_SCAN_LEASE_SECONDS:-60}
      # Empty means Form derives min(15, lease/3), so lowering the lease does
      # not accidentally leave an invalid heartbeat default.
      FORM_SCAN_HEARTBEAT_SECONDS: ${FORM_SCAN_HEARTBEAT_SECONDS:-}
      FORM_SCAN_POLL_SECONDS: ${FORM_SCAN_POLL_SECONDS:-1}
      FORM_SCAN_MAX_ATTEMPTS: ${FORM_SCAN_MAX_ATTEMPTS:-3}
      FORM_SCAN_RETRY_BASE_SECONDS: ${FORM_SCAN_RETRY_BASE_SECONDS:-5}
      FORM_SCAN_RETRY_MAX_SECONDS: ${FORM_SCAN_RETRY_MAX_SECONDS:-300}
      FORM_SCAN_SHUTDOWN_GRACE_SECONDS: ${FORM_SCAN_SHUTDOWN_GRACE_SECONDS:-15}
      FORM_SCAN_JOB_DB_MAX_BYTES: ${FORM_SCAN_JOB_DB_MAX_BYTES:-268435456}
      FORM_SCAN_JOB_WAL_MAX_BYTES: ${FORM_SCAN_JOB_WAL_MAX_BYTES:-16777216}
      FORM_SCAN_JOB_MAX_RECORD_BYTES: ${FORM_SCAN_JOB_MAX_RECORD_BYTES:-65536}
      FORM_SCAN_JOB_MAX_ROWS: ${FORM_SCAN_JOB_MAX_ROWS:-100000}
      FORM_SCAN_JOB_HISTORY_MAX_ROWS: ${FORM_SCAN_JOB_HISTORY_MAX_ROWS:-100000}
      FORM_SCAN_SPOOL_MAX_ARTIFACT_BYTES: ${FORM_SCAN_SPOOL_MAX_ARTIFACT_BYTES:-37748736}
      FORM_SCAN_SPOOL_MAX_TOTAL_BYTES: ${FORM_SCAN_SPOOL_MAX_TOTAL_BYTES:-268435456}
      # Official static trace binary uses live OS connection tables. Set true
      # only after replacing it with a custom binary built with `pcap`.
      FORM_TRACE_PCAP_ENABLED: ${FORM_TRACE_PCAP_ENABLED:-false}
      # A Form-managed IOC feed is copied beside each trace/Guard deployment.
      # The first container start builds it from the supported public adapters;
      # set AUTO_SYNC=false and mount/provide your own JSON for air-gapped use.
      FORM_TRACE_INTEL_PATH: ${FORM_TRACE_INTEL_PATH:-/data/feeds/trace-intel.json}
      FORM_TRACE_INTEL_AUTO_SYNC: ${FORM_TRACE_INTEL_AUTO_SYNC:-true}
      # The official static trace binary intentionally omits eBPF because it
      # needs a matching kernel/BTF, privileges and a special build toolchain.
      # Set this only when FORM_AGENT_TARGET_DIR contains that custom build.
      FORM_TRACE_EBPF_ENABLED: ${FORM_TRACE_EBPF_ENABLED:-false}
      # SSH defaults to persistent trust-on-first-use; production can preseed
      # this file and switch to strict. WinRM validates TLS unless explicitly
      # relaxed for a controlled lab.
      FORM_SSH_HOST_KEY_POLICY: ${FORM_SSH_HOST_KEY_POLICY:-accept-new}
      FORM_SSH_KNOWN_HOSTS: ${FORM_SSH_KNOWN_HOSTS:-/credentials/scdr/agent-remote/known_hosts}
      FORM_WINRM_SKIP_CERT_CHECK: ${FORM_WINRM_SKIP_CERT_CHECK:-false}
      # A transport=local target scans the Form container by default. To scan
      # the real host, mount it read-only and set FORM_LOCAL_SCAN_ROOT=/host.
      # Large Docker/containerd stores can be excluded from local `all` scans
      # while retaining host packages/services/ports/accounts/credentials.
      FORM_LOCAL_SCAN_CONTAINER_ASSETS: ${FORM_LOCAL_SCAN_CONTAINER_ASSETS:-true}
      FORM_LOCAL_SCAN_PROJECT_DISCOVERY: ${FORM_LOCAL_SCAN_PROJECT_DISCOVERY:-true}
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$$FORM_API_TOKEN" ] && [ -s /secrets/form-api/token ]; then
          export FORM_API_TOKEN="$$(cat /secrets/form-api/token)"
        fi
        if [ "$$FORM_AGENT_AUTH_MODE" != "mtls" ] && [ -z "$$FORM_INGEST_TOKEN" ] && [ -s /secrets/form-ingest/token ]; then
          export FORM_INGEST_TOKEN="$$(cat /secrets/form-ingest/token)"
        fi
        if [ -z "$$FORM_METRICS_TOKEN" ] && [ -s /secrets/form-metrics/token ]; then
          export FORM_METRICS_TOKEN="$$(cat /secrets/form-metrics/token)"
        fi
        if [ -z "$$ANALYZER_INTERNAL_TOKEN" ] && [ -s /secrets/analyzer-internal/token ]; then
          export ANALYZER_INTERNAL_TOKEN="$$(cat /secrets/analyzer-internal/token)"
        fi
        if [ -z "$$FORM_API_TOKEN" ] || [ -z "$$FORM_METRICS_TOKEN" ] || [ -z "$$ANALYZER_INTERNAL_TOKEN" ] || { [ "$$FORM_AGENT_AUTH_MODE" != "mtls" ] && [ -z "$$FORM_INGEST_TOKEN" ]; }; then
          echo "kcatta: FORM_API_TOKEN, FORM_METRICS_TOKEN, and ANALYZER_INTERNAL_TOKEN are required; FORM_INGEST_TOKEN is also required outside strict mTLS mode" >&2
          exit 1
        fi
        if [ "$$FORM_TRACE_INTEL_AUTO_SYNC" = "true" ] && [ ! -s "$$FORM_TRACE_INTEL_PATH" ]; then
          trace_bin="$$FORM_AGENT_TARGET_DIR/x86_64-unknown-linux-musl/release/agent-collect-trace"
          mkdir -p "$$(dirname "$$FORM_TRACE_INTEL_PATH")"
          trace_tmp="$$FORM_TRACE_INTEL_PATH.tmp"
          rm -f "$$trace_tmp"
          echo "kcatta: trace IOC feed is empty; synchronising Feodo, SSLBL and ThreatFox"
          if "$$trace_bin" intel-sync --source feodo --source sslbl --source threatfox --out "$$trace_tmp"; then
            mv -f "$$trace_tmp" "$$FORM_TRACE_INTEL_PATH"
          else
            rm -f "$$trace_tmp"
            echo "kcatta: trace IOC sync failed; IOC-enabled scans will fail explicitly" >&2
          fi
        fi
        exec .venv/bin/form-api --host 0.0.0.0 --port 10067
    volumes:
      - form-admin-secret:/secrets/form-api:ro
      - form-ingest-secret:/secrets/form-ingest:ro
      - form-metrics-secret:/secrets/form-metrics:ro
      - analyzer-internal-secret:/secrets/analyzer-internal:ro
      - form-data:/data
      - form-credentials:/credentials
      - form-agent-tls:/agent-tls
      - form-agent-identities:/agent-identities
      # Optional real-host local scan:
      # - /:/host:ro
    networks:
      - admin-form
      - form-analyzer
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:10067/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Agent-facing half of the Form component. It serves only the three telemetry
  # ingest routes, requires a CA-validated client certificate at TLS handshake,
  # and reads the same transactional identity registry as the control process.
  # It has no Admin/control token and no CA signing key.
  form-agent:
    image: kcatta-form:latest
    restart: unless-stopped
    depends_on:
      form:
        condition: service_healthy
      analyzer:
        condition: service_healthy
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    mem_limit: 256m
    pids_limit: 128
    ports:
      - "${FORM_AGENT_BIND_ADDRESS:-127.0.0.1}:10443:10443"
    environment:
      FORM_DATA_DIR: /data
      FORM_ANALYZER_BASE_URL: http://analyzer:10068
      ANALYZER_INTERNAL_TOKEN: ${ANALYZER_INTERNAL_TOKEN:-}
      FORM_AGENT_TLS_CERT: /agent-tls/current/server-cert.pem
      FORM_AGENT_TLS_KEY: /agent-tls/current/server-key.pem
      FORM_AGENT_TLS_CLIENT_CA: /agent-tls/ca-cert.pem
      FORM_AGENT_TLS_RELOAD_POLL_SECONDS: ${FORM_AGENT_TLS_RELOAD_POLL_SECONDS:-5}
      FORM_AGENT_TLS_GRACEFUL_SHUTDOWN_SECONDS: ${FORM_AGENT_TLS_GRACEFUL_SHUTDOWN_SECONDS:-30}
      FORM_AGENT_IDENTITY_DATA_DIR: /agent-identities
      FORM_MAX_BODY_BYTES: ${FORM_MAX_BODY_BYTES:-10485760}
      FORM_MAX_IN_FLIGHT: ${FORM_MAX_IN_FLIGHT:-16}
      FORM_MAX_IN_FLIGHT_PER_PEER: ${FORM_MAX_IN_FLIGHT_PER_PEER:-8}
      FORM_MAX_INGEST_IN_FLIGHT_PER_PEER: ${FORM_MAX_INGEST_IN_FLIGHT_PER_PEER:-4}
      FORM_INGEST_RATE_PER_SECOND: ${FORM_INGEST_RATE_PER_SECOND:-5}
      FORM_INGEST_BURST: ${FORM_INGEST_BURST:-20}
      FORM_BODY_READ_TIMEOUT_SECONDS: ${FORM_BODY_READ_TIMEOUT_SECONDS:-30}
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$$ANALYZER_INTERNAL_TOKEN" ] && [ -s /secrets/analyzer-internal/token ]; then
          export ANALYZER_INTERNAL_TOKEN="$$(cat /secrets/analyzer-internal/token)"
        fi
        if [ -z "$$ANALYZER_INTERNAL_TOKEN" ]; then
          echo "kcatta: ANALYZER_INTERNAL_TOKEN is required" >&2
          exit 1
        fi
        exec .venv/bin/form-agent-api --host 0.0.0.0 --port 10443
    volumes:
      - analyzer-internal-secret:/secrets/analyzer-internal:ro
      - form-agent-identities:/agent-identities
      - form-agent-tls:/agent-tls:ro
    networks:
      - form-analyzer
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(0 if s.connect_ex(('127.0.0.1',10443)) == 0 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  admin:
    build:
      context: ./admin
    depends_on:
      token-init:
        condition: service_completed_successfully
      form:
        condition: service_healthy
    # Runtime hardening (G6) — same rationale as analyzer. admin runs as the
    # non-root `nextjs` user (see admin/Dockerfile).
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    mem_limit: 512m
    pids_limit: 256
    # Admin has no built-in human login and its server holds the Form control
    # token, so the zero-config stack binds it to loopback only.
    ports:
      - "${ADMIN_BIND_ADDRESS:-127.0.0.1}:10063:10063"
    environment:
      FORM_BASE_URL: http://form:10067
      FORM_API_TIMEOUT_MS: ${FORM_API_TIMEOUT_MS:-30000}
      # Admin receives only the Form control token, never the Analyzer internal
      # or agent ingest credentials.
      FORM_API_TOKEN: ${FORM_API_TOKEN:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -z "$$FORM_API_TOKEN" ] && [ -s /secrets/form-api/token ]; then
          export FORM_API_TOKEN="$$(cat /secrets/form-api/token)"
        fi
        if [ -z "$$FORM_API_TOKEN" ]; then
          echo "kcatta: FORM_API_TOKEN is required" >&2
          exit 1
        fi
        exec node server.js
    volumes:
      - form-admin-secret:/secrets/form-api:ro
    networks:
      - admin-form

  # Optional operations profile. Prometheus is the only monitoring component
  # admitted to the private Form↔Analyzer network and receives the existing
  # Dedicated Analyzer and Form metrics-only tokens are mounted read-only solely
  # for scraping their respective /metrics routes.
  prometheus:
    image: prom/prometheus:v3.12.0
    profiles:
      - monitoring
    restart: unless-stopped
    depends_on:
      token-init:
        condition: service_completed_successfully
      analyzer:
        condition: service_healthy
      form:
        condition: service_healthy
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    mem_limit: 256m
    pids_limit: 128
    ports:
      - "${PROMETHEUS_BIND_ADDRESS:-127.0.0.1}:10065:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - analyzer-metrics-secret:/secrets/analyzer-metrics:ro
      - form-metrics-secret:/secrets/form-metrics:ro
      - prometheus-data:/prometheus
    tmpfs:
      - /tmp:size=16m,mode=1777
    networks:
      - form-analyzer
      - monitoring

  # Dependency-free, read-only dashboard served from repository-owned static
  # files. It queries Prometheus from the browser and stores no credentials.
  monitoring-dashboard:
    image: python:3.11.11-slim
    profiles:
      - monitoring
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_started
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    read_only: true
    mem_limit: 64m
    pids_limit: 64
    ports:
      - "${MONITORING_DASHBOARD_BIND_ADDRESS:-127.0.0.1}:10064:8080"
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
    command:
      - python
      - -m
      - http.server
      - "8080"
      - --bind
      - 0.0.0.0
      - --directory
      - /dashboard
    volumes:
      - ./monitoring/dashboard:/dashboard:ro
    tmpfs:
      - /tmp:size=32m,mode=1777
    networks:
      - monitoring

volumes:
  form-admin-secret:
  form-ingest-secret:
  form-metrics-secret:
  analyzer-internal-secret:
  analyzer-metrics-secret:
  analyzer-data:
  form-data:
  form-credentials:
  form-agent-tls:
  form-agent-identities:
  prometheus-data:

networks:
  admin-form:
  form-analyzer:
    internal: true
  monitoring:
