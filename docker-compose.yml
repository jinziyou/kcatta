# Local stack: form API + portal UI.
#
#   docker compose up --build
#   open http://localhost:3000
#
# Override the shared token via .env (see .env.example).

services:
  form:
    build: ./form
    ports:
      - "8000:8000"
    environment:
      FORM_DATA_DIR: /data
      FORM_STORAGE: sqlite
      FORM_CORS_ORIGINS: http://localhost:3000
      FORM_API_TOKEN: ${FORM_API_TOKEN:-dev-token-change-me}
    volumes:
      - form-data:/data

  portal:
    build:
      context: ./portal
      args:
        NEXT_PUBLIC_FORM_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      FORM_API_TOKEN: ${FORM_API_TOKEN:-dev-token-change-me}
    depends_on:
      - form

volumes:
  form-data:
