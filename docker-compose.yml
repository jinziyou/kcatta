# Local stack: analyzer API + admin UI.
#
#   cp .env.example .env   # then set a strong ANALYZER_API_TOKEN
#   docker compose up --build
#   open http://localhost:3000
#
# ANALYZER_API_TOKEN must be provided via .env — compose intentionally has NO
# built-in default (a shipped default token == no auth). See .env.example.

services:
  analyzer:
    build: ./analyzer
    ports:
      - "8000:8000"
    environment:
      ANALYZER_DATA_DIR: /data
      ANALYZER_STORAGE: sqlite
      ANALYZER_CORS_ORIGINS: http://localhost:3000
      ANALYZER_API_TOKEN: ${ANALYZER_API_TOKEN:?set ANALYZER_API_TOKEN in .env (see .env.example); refusing to start with a built-in default token}
    volumes:
      - analyzer-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  admin:
    build:
      context: ./admin
      args:
        # analyzer access is server-side (RSC fetch) inside the admin container, so this
        # must be the compose service DNS name, not localhost (which is the admin itself).
        NEXT_PUBLIC_ANALYZER_BASE_URL: http://analyzer:8000
    ports:
      - "3000:3000"
    environment:
      ANALYZER_API_TOKEN: ${ANALYZER_API_TOKEN:?set ANALYZER_API_TOKEN in .env (see .env.example); refusing to start with a built-in default token}
    depends_on:
      analyzer:
        condition: service_healthy

volumes:
  analyzer-data:
