[package]
name = "probe-intel-sync"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "posture network IOC feed sync (download remote feeds → local JSON)"
readme = "README.md"

[[bin]]
name = "probe-intel-sync"
path = "src/main.rs"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
probe-flow = { version = "0.1.0", path = "../probe-flow" }
reqwest = { version = "0.12.28", default-features = false, features = ["blocking", "rustls-tls"] }

[lints]
workspace = true
