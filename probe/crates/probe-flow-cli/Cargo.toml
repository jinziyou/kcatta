[package]
name = "probe-flow-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true

[[bin]]
name = "probe-flow"
path = "src/main.rs"

[features]
default = []
pcap = ["probe-flow/pcap"]

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["derive"] }
probe-flow = { version = "0.1.0", path = "../probe-flow" }
probe-ingest = { version = "0.1.0", path = "../probe-ingest" }
serde_json = "1.0.150"

[lints]
workspace = true
