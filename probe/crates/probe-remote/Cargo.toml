[package]
name = "probe-remote"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "cyber-posture remote agent-mode scanning: ship probe-asset over SSH, run, pull JSON"
readme = "README.md"

[[bin]]
name = "probe-remote"
path = "src/bin/probe-remote.rs"

[features]
# Vendor OpenSSL: compile it from source (bundled via libssh2-sys) so the SSH
# transport links without a system OpenSSL install or pkg-config. On by default
# so `cargo build` works out-of-the-box on minimal hosts. Disable with
# `--no-default-features` to link the system OpenSSL instead (a faster build
# where libssl-dev + pkg-config are already present, e.g. CI runners).
default = ["vendored-openssl"]
vendored-openssl = ["ssh2/vendored-openssl"]

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true, features = ["clock", "std"] }
clap = { workspace = true, features = ["env"] }
base64 = "0.22.1"
dirs = "5.0.1"
probe-asset = { version = "0.1.0", path = "../probe-asset" }
probe-contract = { version = "0.1.0", path = "../probe-contract" }
probe-ingest = { version = "0.1.0", path = "../probe-ingest" }
probe-malware = { version = "0.1.0", path = "../probe-malware" }
probe-runtime = { version = "0.1.0", path = "../probe-runtime" }
serde = { workspace = true }
serde_json = { workspace = true }
ssh2 = "0.9.5"
tempfile = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
