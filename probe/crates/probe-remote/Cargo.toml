[package]
name = "probe-remote"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "cyber-posture remote agent-mode scanning: ship probe-asset over SSH, run, pull JSON"
readme = "README.md"

[[bin]]
name = "probe-remote"
path = "src/bin/probe-remote.rs"

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true, features = ["clock", "std"] }
clap = { workspace = true, features = ["env"] }
dirs = "5.0.1"
probe-asset = { version = "0.1.0", path = "../probe-asset" }
probe-contract = { version = "0.1.0", path = "../probe-contract" }
probe-ingest = { version = "0.1.0", path = "../probe-ingest" }
probe-malware = { version = "0.1.0", path = "../probe-malware" }
serde = { workspace = true }
serde_json = { workspace = true }
ssh2 = "0.9.5"
tempfile = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
