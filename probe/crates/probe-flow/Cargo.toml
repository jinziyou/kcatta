[package]
name = "probe-flow"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
description = "cyber-posture network flow capture + threat-intel IOC matching"
readme = "README.md"

[dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.44", default-features = false, features = ["clock", "std", "serde"] }
md5 = "0.8.0"
pcap = { version = "2.4.0", optional = true }
probe-contract = { version = "0.1.0", path = "../probe-contract" }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
uuid = { version = "1.23.1", features = ["v4", "serde"] }

[features]
default = []
pcap = ["dep:pcap"]

[lints]
workspace = true

[dev-dependencies]
jsonschema = "0.46.5"
